services:
  db:
    image: postgres:16-alpine
    container_name: wedding-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./wedding-backend
      dockerfile: Dockerfile
    container_name: wedding-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - ABACATEPAY_API_KEY=${ABACATEPAY_API_KEY}
      - ABACATEPAY_BASE_URL=${ABACATEPAY_BASE_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./wedding-front
      dockerfile: Dockerfile
    container_name: wedding-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://backend:8080/api
    depends_on:
      - backend
    ports:
      - "9000:9000"

volumes:
  db_data:

