services:
  db:
    image: postgres:16-alpine
    container_name: wedding-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wedding}
      - POSTGRES_USER=${POSTGRES_USER:-wedding}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-wedding}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./wedding-backend
      dockerfile: Dockerfile
    container_name: wedding-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-wedding}
      - DB_USERNAME=${POSTGRES_USER:-wedding}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-wedding}
      - ABACATEPAY_API_KEY=${ABACATEPAY_API_KEY:-}
      - ABACATEPAY_BASE_URL=${ABACATEPAY_BASE_URL:-https://api.abacatepay.com}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:9000}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-use-a-long-random-string-for-docker-dev}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./wedding-front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    container_name: wedding-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "9000:9000"

volumes:
  db_data:
